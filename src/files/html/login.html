<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login • TaskReminder</title>
<link rel="stylesheet" href="auth.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="auth-wrapper">

<div class="auth-card">

<h1 class="brand">TaskReminder</h1>
<p class="subtitle">Sign in to continue</p>

<div class="form-group">
<label>Email</label>
<input id="loginEmail" type="email" placeholder="Enter your email">
<span class="error" id="loginEmailError"></span>
</div>

<div class="form-group">
<label>Password</label>
<input id="loginPassword" type="password" placeholder="Enter password">
<span class="error" id="loginPasswordError"></span>
</div>

<button id="loginBtn" class="auth-btn">Login</button>

<p class="switch">
Don't have an account?
<a href="register.html">Create account</a>
</p>

</div>

</div>

<script src="auth.js"></script>
</body>
</html>
