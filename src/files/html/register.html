<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register • TaskReminder</title>
<link rel="stylesheet" href="auth.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="auth-wrapper">

<div class="auth-card">

<h1 class="brand">TaskReminder</h1>
<p class="subtitle">Create your account</p>

<div class="form-group">
<label>Email</label>
<input id="regEmail" type="email" placeholder="Enter your email">
<span class="error" id="regEmailError"></span>
</div>

<div class="form-group">
<label>Password</label>
<input id="regPassword" type="password" placeholder="Create password">
<span class="error" id="regPasswordError"></span>
</div>

<button id="registerBtn" class="auth-btn">Register</button>

<p class="switch">
Already have account?
<a href="login.html">Login</a>
</p>

</div>

</div>

<script src="auth.js"></script>
</body>
</html>
